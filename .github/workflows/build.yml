name: Build & Release

# Triggers:
#   - Push a version tag:  git tag v1.0.0 && git push origin v1.0.0
#   - Manual run from the GitHub Actions tab (Actions → Build & Release → Run workflow)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:

  # ─────────────────────────────────────────────────────────────
  #  macOS — produces CyberWarSandbox_Mac.zip (.app inside)
  # ─────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Mac icon (.icns)
        run: |
          unzip cyberwar_iconset.zip
          iconutil -c icns cyberwar.iconset -o icon.icns

      - name: Build .app with PyInstaller
        run: pyinstaller cyberwar.spec

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r CyberWarSandbox_Mac.zip CyberWarSandbox.app

      - name: Upload Mac build to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || inputs.version }}
          name: CyberWar Sandbox ${{ github.ref_name != '' && github.ref_name || inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/CyberWarSandbox_Mac.zip

  # ─────────────────────────────────────────────────────────────
  #  Windows — produces CyberWarSandbox_Windows.zip (.exe inside)
  # ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: pyinstaller cyberwar.spec

      - name: Zip Windows folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist\CyberWarSandbox `
                           -DestinationPath dist\CyberWarSandbox_Windows.zip

      - name: Upload Windows build to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || inputs.version }}
          name: CyberWar Sandbox ${{ github.ref_name != '' && github.ref_name || inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist\CyberWarSandbox_Windows.zip
