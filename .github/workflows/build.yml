name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate icon
        run: |
          if [ -f cyberwar_iconset.zip ]; then
            unzip cyberwar_iconset.zip
            iconutil -c icns cyberwar.iconset -o icon.icns
          fi

      - name: Build Mac app
        run: pyinstaller cyberwar.spec

      - name: Zip app
        run: cd dist && zip -r CyberWarSandbox_Mac.zip CyberWarSandbox.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist/CyberWarSandbox_Mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows app
        run: pyinstaller cyberwar.spec

      - name: Zip app
        shell: pwsh
        run: Compress-Archive -Path dist\CyberWarSandbox -DestinationPath dist\CyberWarSandbox_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist\CyberWarSandbox_Windows.zip

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows

      - name: Delete existing latest release
        run: |
          gh release delete latest --yes --repo ${{ github.repository }} || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: CyberWar Sandbox — Latest Build
          body: |
            Automated build from the latest commit on main.
            Download the file for your platform below.
          draft: false
          prerelease: false
          files: |
            CyberWarSandbox_Mac.zip
            CyberWarSandbox_Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
