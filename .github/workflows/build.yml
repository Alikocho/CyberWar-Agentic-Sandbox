name: Build CyberWar

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          if [ -f cyberwar_iconset.zip ]; then
            unzip cyberwar_iconset.zip
            iconutil -c icns cyberwar.iconset -o icon.icns
          fi
      - run: pyinstaller cyberwar.spec
      - run: cd dist && zip -r CyberWarSandbox_Mac.zip CyberWarSandbox.app
      - uses: actions/upload-artifact@v4
        with:
          name: CyberWarSandbox_Mac
          path: dist/CyberWarSandbox_Mac.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pyinstaller cyberwar.spec
      - shell: pwsh
        run: Compress-Archive -Path dist\CyberWarSandbox -DestinationPath dist\CyberWarSandbox_Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: CyberWarSandbox_Windows
          path: dist\CyberWarSandbox_Windows.zip
          retention-days: 30

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CyberWarSandbox_Mac

      - uses: actions/download-artifact@v4
        with:
          name: CyberWarSandbox_Windows

      - uses: softprops/action-gh-release@v2
        with:
          name: CyberWar Sandbox ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            CyberWarSandbox_Mac.zip
            CyberWarSandbox_Windows.zip
