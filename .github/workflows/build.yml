name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────
  #  macOS build
  # ─────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Mac icon (.icns)
        run: |
          if [ -f cyberwar_iconset.zip ]; then
            unzip cyberwar_iconset.zip
            iconutil -c icns cyberwar.iconset -o icon.icns
          fi

      - name: Build .app with PyInstaller
        run: pyinstaller cyberwar.spec

      - name: Zip .app bundle
        run: cd dist && zip -r CyberWarSandbox_Mac.zip CyberWarSandbox.app

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/CyberWarSandbox_Mac.zip

  # ─────────────────────────────────────────────────────────────
  #  Windows build
  # ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: pyinstaller cyberwar.spec

      - name: Zip Windows folder
        shell: pwsh
        run: Compress-Archive -Path dist\CyberWarSandbox -DestinationPath dist\CyberWarSandbox_Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist\CyberWarSandbox_Windows.zip

  # ─────────────────────────────────────────────────────────────
  #  Create release with both builds attached
  # ─────────────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || inputs.version }}
          name: CyberWar Sandbox ${{ github.ref_name != '' && github.ref_name || inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            CyberWarSandbox_Mac.zip
            CyberWarSandbox_Windows.zip
